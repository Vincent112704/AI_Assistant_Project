version: "3.9"

services:
  fastapi-app:
    build: .
    container_name: fastapi-debug-container

    ports:
      - "8000:8000"
      - "5678:5678"

    environment:
      - DEBUG_MODE=true

    volumes:
      - ./src:/app/src
      - ./.env:/app/.env

    command: >
      python -m debugpy
      --listen 0.0.0.0:5678
      -m uvicorn src.main:app
      --host 0.0.0.0
      --port 8000